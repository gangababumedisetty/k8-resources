apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
   # these labels are replicaset labels
  labels:
    project: roboshop
    purpose: rs-demo
    tier: frontend
    component: frontend
  spec:
    replicas: 1
    selector:
    # using these laables replica set selects the pod
     matchLabels:
       project: roboshop
       purpose: rs-demo
       tier: frontend
       component: frontend
    # This is pod defination , Pod is subset of replicaset
     template:
       metadata:
         laables:
           project: roboshop
           purpose: rs-demo
           tier: frontend
           component: frontend
       spec:
         container:
         - name: nginx
           image: nginx:stable-alpine.23-per1